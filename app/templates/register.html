{% extends "base.html" %}
{% block title %}Register — Developer Notebook{% endblock %}
{% block content %}
<section class="auth-panel">
  <h1>Register</h1>
  {% if error %}
  <p class="auth-panel__error" role="alert">{{ error }}</p>
  {% endif %}
  <form method="post" action="/register" class="auth-form">
    <label class="auth-form__field">
      <span>Username</span>
      <input name="username" type="text" required autocomplete="username" maxlength="150">
    </label>
    <label class="auth-form__field">
      <span>Password</span>
      <input name="password" type="password" required autocomplete="new-password">
    </label>
    <button type="submit" class="auth-form__submit">Create account</button>
  </form>
  <p class="auth-panel__footer"><a href="/login">Already have an account? Log in</a></p>
</section>
{% endblock %}
