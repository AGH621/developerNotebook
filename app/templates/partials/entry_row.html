<tr
  class="entry-row"
  id="entry-row-{{ entry.id }}"
  data-entry-id="{{ entry.id|string }}"
>
  <td class="entry-row__description">
    <div class="entry-row__description-inner">
      <button
        type="button"
        class="entry-row__drag"
        aria-label="Reorder entries"
        title="Drag to reorder"
      >⋮⋮</button>
      <div class="entry-row__ellipsis-line">
        <span class="entry-row__description-text">{{ entry.description }}</span>
        {% if entry.description.strip() %}
          <span class="entry-row__ellipsis-wrap">
            <button type="button" class="entry-row__ellipsis-btn" aria-label="Show full description">
              <span class="entry-row__ellipsis-btn-icon" aria-hidden="true">
                <svg><use href="#sprite-icon-more-h"/></svg>
              </span>
            </button>
            <div class="entry-row__ellipsis-tooltip" aria-hidden="true">{{ entry.description }}</div>
          </span>
        {% endif %}
      </div>
    </div>
  </td>
  <td class="entry-row__command">
    <div class="entry-row__ellipsis-line entry-row__ellipsis-line--cmd">
      <code class="entry-row__code"><span class="entry-row__code-text">{{ entry.command }}</span></code>
      {% if entry.command.strip() %}
        <span class="entry-row__ellipsis-wrap">
          <button type="button" class="entry-row__ellipsis-btn" aria-label="Show full command">
            <span class="entry-row__ellipsis-btn-icon" aria-hidden="true">
              <svg><use href="#sprite-icon-more-h"/></svg>
            </span>
          </button>
            <div class="entry-row__ellipsis-tooltip entry-row__ellipsis-tooltip--cmd" aria-hidden="true">{{ entry.command }}</div>
        </span>
      {% endif %}
    </div>
  </td>
  <td class="entry-row__actions">
    <div class="entry-row__actions-inner">
      <button
        type="button"
        class="entry-copy entry-row__btn icon-label-btn"
        data-command="{{ entry.command|e }}"
        title="Copy"
        aria-label="Copy command to clipboard"
      >
        <span class="icon-label-btn__icon" aria-hidden="true">
          <svg><use href="#sprite-icon-copy"/></svg>
        </span>
      </button>
      <button
        type="button"
        class="entry-row__btn icon-label-btn"
        title="Edit"
        aria-label="Edit entry"
        hx-get="/entries/{{ entry.id }}/edit"
        hx-target="#entry-row-{{ entry.id }}"
        hx-swap="outerHTML"
      >
        <span class="icon-label-btn__icon" aria-hidden="true">
          <svg><use href="#sprite-icon-edit"/></svg>
        </span>
      </button>
      <button
        type="button"
        class="entry-row__btn entry-row__btn--danger icon-label-btn"
        title="Delete"
        aria-label="Delete entry"
        hx-delete="/entries/{{ entry.id }}"
        hx-target="#entry-row-{{ entry.id }}"
        hx-swap="delete"
        hx-confirm="Delete this entry?"
      >
        <span class="icon-label-btn__icon" aria-hidden="true">
          <svg><use href="#sprite-topic-menu-delete"/></svg>
        </span>
      </button>
    </div>
  </td>
</tr>
