{% if query %}
<div class="nav-search-results">
  {% if results %}
    <ul class="nav-search-results__list">
      {% for row in results %}
        <li class="nav-search-results__item">
          <a
            class="nav-search-results__link"
            href="/topic/{{ row.topic_slug }}#entry-row-{{ row.entry_id }}"
            aria-label="Open topic {{ row.topic_name }}: {{ row.command }}"
          >
            <code class="nav-search-results__cmd">{{ row.command }}</code>
          </a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="nav-search-results__empty">No matching notebook entries.</p>
  {% endif %}
</div>
{% endif %}
