<section class="admin-starter-section" id="admin-starter-section-{{ section.id }}">
  <header class="admin-starter-section__head">
    <form
      method="post"
      action="/admin/starter/sections/{{ section.id }}/save"
      class="admin-starter-section__form"
    >
      {% include "partials/csrf_field.html" %}
      <label class="admin-field">
        <span>Section heading</span>
        <input type="text" name="name" value="{{ section.name or '' }}" maxlength="256" autocomplete="off" placeholder="Blank (unnamed section)">
      </label>
      <label class="admin-field">
        <span>Notes</span>
        <textarea name="notes" rows="2" maxlength="8000" placeholder="Optional callout">{{ section.notes or '' }}</textarea>
      </label>
      <div class="admin-starter-section__toolbar">
        <button type="submit" class="admin-btn admin-btn--secondary admin-btn--small">Save section</button>
      </div>
    </form>
    <form
      method="post"
      action="/admin/starter/sections/{{ section.id }}/delete"
      class="admin-starter-section__delete-form"
      data-confirm="Remove this starter section and all its commands?"
    >
      {% include "partials/csrf_field.html" %}
      <button type="submit" class="admin-btn admin-btn--danger admin-btn--small">Delete section</button>
    </form>
  </header>

  <div class="admin-entry-list">
    {% for entry in section.entries %}
    {% include "admin/partials/starter_entry_edit.html" %}
    {% endfor %}
  </div>

  <form class="admin-add-row admin-add-entry" method="post" action="/admin/starter/sections/{{ section.id }}/entries">
    {% include "partials/csrf_field.html" %}
    <label class="admin-field admin-field--tight">
      <span class="sr-only">Description</span>
      <input type="text" name="description" placeholder="New description" maxlength="4000" autocomplete="off" class="admin-text-input admin-text-input--grow">
    </label>
    <label class="admin-field admin-field--tight">
      <span class="sr-only">Command</span>
      <input type="text" name="command" placeholder="command …" maxlength="8000" autocomplete="off" class="admin-text-input admin-text-input--grow">
    </label>
    <button type="submit" class="admin-btn admin-btn--primary admin-btn--small">Add command</button>
  </form>
</section>
