<div class="admin-entry-edit" id="admin-starter-entry-{{ entry.id }}">
  <form class="admin-entry-edit__grid" hx-put="/admin/starter/entries/{{ entry.id }}" hx-indicator="closest form">
    <label class="admin-field admin-field--tight">
      <span>Description</span>
      <input type="text" name="description" value="{{ entry.description }}" maxlength="4000" autocomplete="off">
    </label>
    <label class="admin-field admin-field--tight">
      <span>Command</span>
      <input type="text" name="command" value="{{ entry.command }}" maxlength="8000" autocomplete="off">
    </label>
    <div class="admin-entry-edit__buttons">
      <button type="submit" class="admin-btn admin-btn--secondary admin-btn--small">Save</button>
    </div>
  </form>
  <button type="button" class="admin-btn admin-btn--danger admin-btn--small admin-entry-edit__remove"
    hx-delete="/admin/starter/entries/{{ entry.id }}"
    hx-confirm="Delete this starter command row?">
    Remove
  </button>
</div>
