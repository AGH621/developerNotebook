<div class="admin-entry-edit" id="admin-starter-entry-{{ entry.id }}">
  <form
    method="post"
    action="/admin/starter/entries/{{ entry.id }}/save"
    class="admin-entry-edit__grid"
  >
    {% include "partials/csrf_field.html" %}
    <label class="admin-field admin-field--tight">
      <span>Description</span>
      <input type="text" name="description" value="{{ entry.description }}" maxlength="4000" autocomplete="off">
    </label>
    <label class="admin-field admin-field--tight">
      <span>Command</span>
      <input type="text" name="command" value="{{ entry.command }}" maxlength="8000" autocomplete="off">
    </label>
    <div class="admin-entry-edit__buttons">
      <button type="submit" class="admin-btn admin-btn--secondary admin-btn--small">Save</button>
    </div>
  </form>
  <form
    method="post"
    action="/admin/starter/entries/{{ entry.id }}/delete"
    class="admin-entry-edit__remove"
    onsubmit="return confirm('Delete this starter command row?');"
  >
    {% include "partials/csrf_field.html" %}
    <button type="submit" class="admin-btn admin-btn--danger admin-btn--small admin-entry-edit__remove-btn">
      Remove
    </button>
  </form>
</div>
