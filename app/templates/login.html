{% extends "base.html" %}
{% block title %}Log in — Developer Notebook{% endblock %}
{% block content %}
<section class="auth-panel">
  <h1>Log in</h1>
  {% if error %}
  <p class="auth-panel__error" role="alert">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login" class="auth-form">
    {% include "partials/csrf_field.html" %}
    <label class="auth-form__field">
      <span>Username</span>
      <input name="username" type="text" required autocomplete="username" maxlength="150">
    </label>
    <label class="auth-form__field">
      <span>Password</span>
      <input name="password" type="password" required autocomplete="current-password">
    </label>
    <button type="submit" class="auth-form__submit">Log in</button>
  </form>
  <p class="auth-panel__footer"><a href="/register">Create an account</a> · invitation link required</p>
</section>
{% endblock %}
