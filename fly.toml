app = "developer-memory-garden"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "notebook_data"
  destination = "/data"
  initial_size = "1gb"
